
# ============================================================
# Emergency Response System — Full Docker Compose
# Runs: PostgreSQL+PostGIS, Redis, Agent 1, 2, 3, 4, Streamlit
# Usage: docker-compose up --build
# ============================================================

services:

  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgis/postgis:15-3.3
    container_name: disaster_postgres
    environment:
      POSTGRES_DB:                disaster_response
      POSTGRES_USER:              postgres
      POSTGRES_PASSWORD:          postgres
      POSTGRES_HOST_AUTH_METHOD:  trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d   # Auto-runs all .sql files on first start
    networks:
      - disaster_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d disaster_response"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: disaster_redis
    ports:
      - "6379:6379"
    command: redis-server --timeout 0 --tcp-keepalive 60
    networks:
      - disaster_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Agent 1: Environmental Intelligence ──────────────────

  agent1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agent1_environmental
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://postgres:postgres@postgres:5432/disaster_response
      DATABASE_URL_ASYNC: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:         redis://redis:6379
      PYTHONPATH:        /app
      AGENT_PORT:        "8001"
      FLOOD_MODEL_PATH:  /app/backend/models/flood_fast_best.keras
      SAR_REF_START:     "2024-01-01"
      SAR_REF_END:       "2024-04-06"
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./backend/models:/app/backend/models
      - ./backend/config:/app/backend/config        # ← ADD THIS
      - ~/.config/earthengine:/root/.config/earthengine  # Mount Earth Engine credentials
    networks:
      - disaster_network
    command: >
      uvicorn backend.src.agents.agent_1_environmental.main:app
      --host 0.0.0.0 --port 8001
    restart: unless-stopped

  # ── Agent 2: Distress Intelligence ───────────────────────

  agent2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent2_distress
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent1:
        condition: service_started
    environment:
      DATABASE_URL:       postgresql://postgres:postgres@postgres:5432/disaster_response
      DATABASE_URL_ASYNC: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:          redis://redis:6379
      PYTHONPATH:         /app/backend
      AGENT_PORT:         "8002"
    env_file:
      - .env
    ports:
      - "8002:8002"
    volumes:
      - ./backend:/app
    networks:
      - disaster_network
    command: >
      uvicorn src.agents.agent_2_distress.main:app
      --host 0.0.0.0 --port 8002
    restart: unless-stopped

  # ── Agent 3: Resource Management ─────────────────────────

  agent3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent3_resource
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:       postgresql://postgres:postgres@postgres:5432/disaster_response
      DATABASE_URL_ASYNC: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:          redis://redis:6379
      PYTHONPATH:         /app/backend
      AGENT_PORT:         "8003"
    env_file:
      - .env
    ports:
      - "8003:8003"
    volumes:
      - ./backend:/app
    networks:
      - disaster_network
    command: >
      uvicorn src.agents.agent_3_resource.main:app
      --host 0.0.0.0 --port 8003
    restart: unless-stopped

  # ── Agent 4: Dispatch Optimization ───────────────────────

  agent4:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent4_dispatch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent3:
        condition: service_started
    environment:
      DATABASE_URL:       postgresql://postgres:postgres@postgres:5432/disaster_response
      DATABASE_URL_ASYNC: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:          redis://redis:6379
      OSRM_URL:           http://router.project-osrm.org
      PYTHONPATH:         /app/backend
      AGENT_PORT:         "8004"
    env_file:
      - .env
    ports:
      - "8004:8004"
    volumes:
      - ./backend:/app
    networks:
      - disaster_network
    command: >
      uvicorn src.agents.agent_4_dispatch.main:app
      --host 0.0.0.0 --port 8004
    restart: unless-stopped

  # ── Streamlit Dashboard ───────────────────────────────────

frontend:
  build: ./frontend
  ports:
    - "3000:3000"
  depends_on:
    - backend

dashboard_api:
  build: ./backend
  command: uvicorn app.main:app --host 0.0.0.0 --port 8005
  ports:
    - "8005:8005"
  depends_on:
    - postgres
    - redis

volumes:
  postgres_data:

networks:
  disaster_network:
    driver: bridge