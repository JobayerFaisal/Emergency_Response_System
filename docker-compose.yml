version: '3.8'

services:

  # PostgreSQL + PostGIS service
  postgres:
    image: postgis/postgis:15-3.3
    container_name: disaster_postgres
    environment:
      POSTGRES_DB: disaster_response
      POSTGRES_USER: postgres             # matches DATABASE_URL user
      POSTGRES_PASSWORD: postgres         # matches DATABASE_URL password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - disaster_network

  # Redis service (for inter-agent communication)
  redis:
    image: redis:7-alpine
    container_name: disaster_redis
    ports:
      - "6379:6379"
    networks:
      - disaster_network

  # Backend service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disaster_backend
    depends_on:
      - postgres
      - redis
    environment:
      # IMPORTANT: inside Docker containers, use the service name "postgres"
      # not "localhost" — localhost inside a container points to itself, not the DB.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    networks:
      - disaster_network

  # Streamlit UI service
  streamlit:
    build:
      context: ./backend/streamlit_app
      dockerfile: Dockerfile
    container_name: disaster_streamlit
    depends_on:
      - backend
    ports:
      - "8501:8501"
    volumes:
      - ./backend/streamlit_app:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL: redis://redis:6379/0
    networks:
      - disaster_network

  # Agent 1 (Environmental Intelligence)
  agent1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent1_environmental
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - disaster_network
    # Path inside container: /app/src/agents/agent_1_environmental/main.py
    # (./backend is mounted to /app, and real path is backend/src/agents/...)
    command: ["python", "src/agents/agent_1_environmental/main.py"]

  # Agent 3 (Resource Management) — uncomment when ready
  # agent3:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: agent3_resource
  #   depends_on:
  #     - postgres
  #     - redis
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
  #     REDIS_URL: redis://redis:6379/0
  #   ports:
  #     - "8003:8003"
  #   volumes:
  #     - ./backend:/app
  #   env_file:
  #     - .env
  #   networks:
  #     - disaster_network
  #   command: ["python", "src/agents/agent_3_resource/main.py"]

  # Agent 4 (Dispatch Optimization) — uncomment when ready
  # agent4:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: agent4_dispatch
  #   depends_on:
  #     - postgres
  #     - redis
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
  #     REDIS_URL: redis://redis:6379/0
  #   ports:
  #     - "8004:8004"
  #   volumes:
  #     - ./backend:/app
  #   env_file:
  #     - .env
  #   networks:
  #     - disaster_network
  #   command: ["python", "src/agents/agent_4_dispatch/main.py"]

volumes:
  postgres_data:
  # removed orphan volume "postgres_data_restore" — was declared but never mounted

networks:
  disaster_network:
    driver: bridge