# docker-compose.yml — AMAS Emergency Response System
# Schema fix: postgres now mounts /database/init/ for first-boot migration,
# and has a health-check so Agent 1 waits for postgres to be ready.

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:15-3.3
    container_name: disaster_postgres
    environment:
      POSTGRES_DB:       disaster_response
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # FIX: Mount init script + SQL files so postgres applies them on first boot.
      # Postgres runs /docker-entrypoint-initdb.d/ files ONCE on a fresh volume.
      - ./backend/database/init/00_run_all.sh:/docker-entrypoint-initdb.d/00_run_all.sh
      - ./backend/database:/docker-entrypoint-initdb.d/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d disaster_response"]
      interval: 5s
      timeout: 5s
      retries: 12          # Wait up to 60s for postgres to be ready
      start_period: 10s
    networks:
      - disaster_network

  redis:
    image: redis:7-alpine
    container_name: disaster_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 6
    networks:
      - disaster_network

  # ── Dashboard API (serves React frontend + WebSocket) ────────────────────

  dashboard_api:
    build:
      context: ./backend
      dockerfile: Dockerfile.slim
    container_name: dashboard_api
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8005
        --reload
    depends_on:
      postgres:
        condition: service_healthy   # Wait for postgres health-check to pass
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:  postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:     redis://redis:6379/0
      DASHBOARD_PORT: "8005"
      CORS_ORIGINS:  "http://localhost:3000,http://localhost:5173,http://frontend:3000"
    env_file:
      - .env
    ports:
      - "8005:8005"
    volumes:
      - ./backend:/app
    networks:
      - disaster_network

  # ── React Frontend ────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disaster_frontend
    depends_on:
      - dashboard_api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - disaster_network

  # ── Agent 1 (Environmental Intelligence — heavy TF + GEE image) ──────────

  agent1:
    build:
      context: ./backend
      dockerfile: Dockerfile.agent1
    container_name: agent1_environmental
    command: >
      uvicorn backend.src.agents.agent_1_environmental.main:app
        --host 0.0.0.0
        --port 8001
        --reload
    depends_on:
      postgres:
        condition: service_healthy   # FIX: was depends_on without condition
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:    redis://redis:6379/0
      LOG_DIR:      /var/log/amas
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    networks:
      - disaster_network

  # ── Agent 2 (Distress Intelligence) ──────────────────────────────────────

  agent2:
    build:
      context: ./backend
      dockerfile: Dockerfile.slim
    container_name: agent2_distress
    command: python -m backend.src.agents.agent_2_distress.main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:    redis://redis:6379/0
    env_file:
      - .env
    networks:
      - disaster_network

  # ── Agent 3 (Resource Management) ────────────────────────────────────────

  agent3:
    build:
      context: ./backend
      dockerfile: Dockerfile.slim
    container_name: agent3_resource
    command: python -m backend.src.agents.agent_3_resource.main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:    redis://redis:6379/0
    env_file:
      - .env
    networks:
      - disaster_network

  # ── Agent 4 (Dispatch Optimization) ──────────────────────────────────────

  agent4:
    build:
      context: ./backend
      dockerfile: Dockerfile.slim
    container_name: agent4_dispatch
    command: python -m backend.src.agents.agent_4_dispatch.main
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/disaster_response
      REDIS_URL:    redis://redis:6379/0
    env_file:
      - .env
    networks:
      - disaster_network

volumes:
  postgres_data:

networks:
  disaster_network:
    driver: bridge